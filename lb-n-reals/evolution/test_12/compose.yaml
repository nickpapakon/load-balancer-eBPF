x-deploy-configs:
  LB: &deploy_LB
    resources:
      limits:
        cpus: '0.1'
        memory: 512M
      reservations:
        cpus: '0.1'
        memory: 512M

  clients: &deploy_clients
    resources:
      limits:
        cpus: '0.05'
        memory: 32M
      reservations:
        cpus: '0.05'
        memory: 32M

  reals: &deploy_reals
    resources:
      limits:
        cpus: '0.01'
        memory: 8M
      reservations:
        cpus: '0.01'
        memory: 8M

  gateway: &deploy_gateway
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        cpus: '1'
        memory: 512M

services:

#####   KATRAN   ########
  katran:
    container_name: katran
    build:
      context: katran/
    deploy: *deploy_LB
    privileged: true                    # recommended for XDP/AF_XDP access
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - /lib/modules:/lib/modules:ro
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /usr/src:/usr/src:ro
    networks:
      gateway-lb:
        ipv4_address: ${KATRAN_IP}
        mac_address: ${KATRAN_MAC}
    env_file: .env


###### GATEWAY  #########

  gateway:
    container_name: gateway
    build:
      context: gateway/
    deploy: *deploy_gateway
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    networks:
      gateway-client:
        ipv4_address: ${GATEWAY_CLIENT_IP}
        mac_address: ${GATEWAY_CLIENT_MAC}
      gateway-lb: 
        ipv4_address: ${GATEWAY_KATRAN_IP}
        mac_address: ${GATEWAY_KATRAN_MAC}
      gateway-reals:
        ipv4_address: ${GATEWAY_REAL_IP}
        mac_address:  ${GATEWAY_REAL_MAC}
      gateway-shared-subs-broker:
        ipv4_address: ${GATEWAY_SHARED_SUBS_BROKER_IP}
        mac_address: ${GATEWAY_SHARED_SUBS_BROKER_MAC}
      gateway-scratch-lb:
        ipv4_address: ${GATEWAY_SCRATCH_LB_IP}
        mac_address:  ${GATEWAY_SCRATCH_LB_MAC}
    # depends_on:
    #   - katran
    env_file: .env


######  CLIENTS  #######

  client_0:
    container_name: client_0
    build:
      context: client/
    deploy: *deploy_clients
    cap_add:
      - NET_ADMIN
    depends_on:
      - gateway
    networks:
      gateway-client:
        ipv4_address: ${CLIENT_0_IP}
        mac_address: ${CLIENT_0_MAC}
    env_file: .env
    environment:
      - CLIENT_NUM=0

