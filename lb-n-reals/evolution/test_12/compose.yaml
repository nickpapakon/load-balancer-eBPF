###### Central Broker that handles MQTT v5 Shared Subscriptions #######

  shared_subs_broker:
    container_name: shared_subs_broker
    build:
      context: shared_subs_broker/
    deploy: *deploy_LB   # use same limits as Katran for a fair comparison
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - ./mosquitto_no_logs.conf:/etc/mosquitto/conf.d/mosquitto.conf
    networks:
      gateway-shared-subs-broker:
        ipv4_address: ${SHARED_SUBS_BROKER_IP}
        mac_address: ${SHARED_SUBS_BROKER_MAC}
    env_file: .env


###### Monitoring #######

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
    - 8080:8080
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:rw
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
    - 9091:9090
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --web.enable-admin-api
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - prometheus_data:/prometheus
    depends_on:
    - cadvisor
    extra_hosts:
      - "host.docker.internal:host-gateway"


  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    ports:
      - 3013:3000
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus


########## Volumes and Networks ##########

volumes:
  grafana-storage: {}
  prometheus_data:


networks:
  gateway-client:
    driver: macvlan
    ipam:
      config:
        - subnet: ${GATEWAY_CLIENT_SUBNET}
  gateway-lb:
    driver: macvlan
    ipam:
      config:
        - subnet: ${GATEWAY_KATRAN_SUBNET}
  gateway-reals:
    driver: macvlan
    ipam:
      config:
        - subnet: ${GATEWAY_REAL_SUBNET}
  gateway-scratch-lb:
    driver: macvlan
    ipam:
      config:
        - subnet: ${GATEWAY_SCRATCH_LB_SUBNET}
  gateway-shared-subs-broker:
    driver: macvlan
    ipam:
      config:
        - subnet: ${GATEWAY_SHARED_SUBS_BROKER_SUBNET}
